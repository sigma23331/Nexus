<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>

<title>运势看板</title>

</head>
<body>
<header class="page-head">
<span class="head-ic" aria-hidden="true">✨</span>
<h1>运势看板</h1>
</header>

<main class="stack">
<section>
<h2>维度来源</h2>
<div class="row">
<label>模式 <select><option>星座</option><option>生肖</option><option>塔罗</option></select></label>
</div>
</section>

<section>
<h2>今日概览</h2>
<ul class="metrics">
<li><span class="dot love" aria-hidden="true"></span>爱情：中上</li>
<li><span class="dot work" aria-hidden="true"></span>事业：平稳</li>
<li><span class="dot health" aria-hidden="true"></span>健康：注意作息</li>
<li><span class="dot money" aria-hidden="true"></span>财富：谨慎消费</li>
</ul>
</section>

<section>
<h2>宜 / 忌</h2>
<ul class="dash">
<li>宜：喝奶茶</li>
<li>宜：摸鱼五分钟</li>
<li>忌：熬夜</li>
<li>忌：已读不回</li>
</ul>
</section>

<section>
<h2>运势轨迹</h2>
<div class="block" aria-hidden="true">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
</div>
</section>

<section>
<h2>运势卡片</h2>
<div class="block" aria-hidden="true">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
</div>
<div class="btn-wrap">
<button type="button" class="btn btn-primary">生成卡片</button>
<button type="button" class="btn btn-ghost">分享</button>
</div>
</section>
</main>
