services:
  db:
    image: postgres:15-alpine
    container_name: nexus_postgres
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password123
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "nexus_user", "-d", "nexus_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: .
    container_name: nexus_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: main.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://nexus_user:nexus_password123@db:5432/nexus_db
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: >
      sh -c "flask init-db &&
             flask run --host=0.0.0.0 --port=5000"
volumes:
  postgres_data: