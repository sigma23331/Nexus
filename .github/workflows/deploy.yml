name: Nexus CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd backend
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Vue App
        run: |
          cd frontend
          npm install
          npm run build # 确保这一步会生成 dist 目录
      # 将构建好的 dist 目录临时保存，供下一个 job 使用
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: frontend/dist/

  deploy:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 下载刚才构建好的前端网页
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: ./dist-to-upload

      # 1. 搬运前端文件到 Nginx 目录
      - name: Copy Frontend to Aliyun
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_SERVER_IP }}
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "./dist-to-upload/*"
          target: "/var/www/mind-island/" # 服务器存放网页的地方
          strip_components: 1

      # 2. 远程执行后端重启逻辑
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_SERVER_IP }}
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            cd ${{ secrets.REMOTE_TARGET }}
            git pull origin main
            
            # 后端环境处理
            cd backend
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 使用简单的 pkill 重启法（测试阶段够用）
            pkill gunicorn || true
            gunicorn -w 2 -b 127.0.0.1:5000 app:app --daemon